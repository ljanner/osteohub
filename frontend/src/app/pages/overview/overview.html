<div class="d-flex gap-4">
  <si-search-bar
    class="flex-grow-1"
    placeholder="Suchen..."
    [formControl]="searchValue"
    [debounceTime]="400"
    [showIcon]="true"
  />
  <button
    type="button"
    class="btn btn-icon btn-tertiary"
    aria-label="filter"
    (click)="openFilters()"
  >
    <si-icon [icon]="icons.elementFilter" />
  </button>
</div>
<p>overview works!</p>
<p>{{ sidePanelService.selectedFilters | json }}</p>

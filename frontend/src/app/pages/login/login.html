<div class="d-flex flex-column gap-8 mt-8">
  <div class="d-flex justify-content-center">
    <h2>OsteoHub Login</h2>
  </div>
  <div class="d-flex justify-content-center">
    @if (errorMessage) {
      <si-inline-notification severity="danger" [message]="errorMessage" />
    }
  </div>
  <div class="d-flex justify-content-center">
    <button type="button" class="btn btn-primary" (click)="loginWithGoogle()">
      Mit Google anmelden
    </button>
  </div>
</div>
